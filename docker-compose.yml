# Hometools — Audio + Video (+ optional Channel) Streaming Stack
#
# Quickstart:
#   1. cp docker/.env.example .env
#   2. Trage AUDIO_LIBRARY_PATH und VIDEO_LIBRARY_PATH in .env ein
#   3. docker compose up -d --build
#
# Auf Synology: Container Manager → "Projekt" → docker-compose.yml importieren.
# PUID/PGID in .env an deinen Synology-User anpassen
# (DSM → Systemsteuerung → Benutzer → ID prüfen, oft 1026 / 100).

services:

  # ── Video Streaming (Standard — läuft per Default) ─────────────────────
  video:
    build:
      context: .
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    image: hometools:latest
    container_name: hometools-video
    restart: unless-stopped
    command: ["serve-video", "--host", "0.0.0.0", "--port", "8011"]
    environment:
      HC_PORT: "8011"
      HOMETOOLS_VIDEO_PORT: "8011"
      HOMETOOLS_DEFAULT_LANGUAGE: ${HOMETOOLS_DEFAULT_LANGUAGE:-de}
      HOMETOOLS_VIDEO_PWA_DISPLAY: ${HOMETOOLS_VIDEO_PWA_DISPLAY:-minimal-ui}
    ports:
      - "${VIDEO_PORT:-8011}:8011"
    volumes:
      - ${VIDEO_LIBRARY_PATH:?set VIDEO_LIBRARY_PATH in .env}:/media/video:ro
      - hometools-cache:/data/cache
      - hometools-audit:/data/audit

  # ── Audio Streaming (OPTIONAL) ─────────────────────────────────────────
  # Wird NICHT per Default gestartet. Aktivieren mit:
  #   docker compose --profile audio up -d --build
  # (oder COMPOSE_PROFILES=audio in der .env setzen). AUDIO_LIBRARY_PATH muss
  # dann auf eine existierende Freigabe zeigen. Solange das Profil inaktiv ist,
  # wird die Variable nicht benötigt (Default unten verhindert Parse-Fehler).
  audio:
    profiles: ["audio"]
    build:
      context: .
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    image: hometools:latest
    container_name: hometools-audio
    restart: unless-stopped
    command: ["serve-audio", "--host", "0.0.0.0", "--port", "8010"]
    environment:
      HC_PORT: "8010"
      HOMETOOLS_AUDIO_PORT: "8010"
      HOMETOOLS_DEFAULT_LANGUAGE: ${HOMETOOLS_DEFAULT_LANGUAGE:-de}
      HOMETOOLS_MIN_RATING: ${HOMETOOLS_MIN_RATING:-0}
    ports:
      - "${AUDIO_PORT:-8010}:8010"
    volumes:
      - ${AUDIO_LIBRARY_PATH:-/media/audio}:/media/audio:ro
      - hometools-cache:/data/cache
      - hometools-audit:/data/audit

  # ── Channel (TV) — auskommentieren wenn nicht gebraucht ────────────────
  # channel:
  #   image: hometools:latest
  #   depends_on:
  #     - video   # shared image is built by the video service
  #   container_name: hometools-channel
  #   restart: unless-stopped
  #   command: ["serve-channel", "--host", "0.0.0.0", "--port", "8012"]
  #   environment:
  #     HC_PORT: "8012"
  #     HOMETOOLS_CHANNEL_PORT: "8012"
  #     HOMETOOLS_CHANNEL_SCHEDULE: /config/channel_schedule.yaml
  #   ports:
  #     - "${CHANNEL_PORT:-8012}:8012"
  #   volumes:
  #     - ${VIDEO_LIBRARY_PATH}:/media/video:ro
  #     - ./channel_schedule.yaml:/config/channel_schedule.yaml:ro
  #     - hometools-cache:/data/cache
  #     - hometools-audit:/data/audit

  # ── Alternative: alles in EINEM Container (statt audio + video + channel) ──
  # all-in-one:
  #   image: hometools:latest
  #   container_name: hometools-all
  #   restart: unless-stopped
  #   command: ["serve-all", "--host", "0.0.0.0"]
  #   environment:
  #     HC_PORT: "8010"
  #     HOMETOOLS_AUDIO_PORT: "8010"
  #     HOMETOOLS_VIDEO_PORT: "8011"
  #     HOMETOOLS_CHANNEL_PORT: "8012"
  #   ports:
  #     - "8010:8010"
  #     - "8011:8011"
  #     - "8012:8012"
  #   volumes:
  #     - ${AUDIO_LIBRARY_PATH}:/media/audio:ro
  #     - ${VIDEO_LIBRARY_PATH}:/media/video:ro
  #     - hometools-cache:/data/cache
  #     - hometools-audit:/data/audit

volumes:
  hometools-cache:
    driver: local
  hometools-audit:
    driver: local

