# Pre-commit hooks for hometools
# Install: pre-commit install
# Manual:  pre-commit run --all-files

repos:
  # ── Ruff: lint + format ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.3
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format



