# Pre-commit hooks for hometools
# Install: pre-commit install
# Manual:  pre-commit run --all-files

repos:
  # ── Ruff: lint + format ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.3
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── Pytest: run full test suite before commit ──
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      
      - id: feature-parity
        name: feature-parity tests (catch code drift)
        entry: python -m pytest tests/test_feature_parity.py -v
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [commit]



